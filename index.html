<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task and Habit</title>
    <!-- webfont -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=BBH+Hegarty&family=Cairo:wght@200..1000&family=Momo+Signature&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&family=Stack+Sans+Text:wght@200..700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css file -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- webfont -->
    <link rel="stylesheet" href="css/all.min.css" />
    <link
      rel="shortcut icon"
      href="../../Photos/apple-touch-icon.png"
      type="image/x-icon"
    />
  </head>
  <body class="selection:bg-black selection:text-white">
    <div
      class="Welcome p-10 *:first:font-bold *:last:text-sm *:last:font-light *:last:text-gray-500 *:first:text-2xl *:py-1"
    >
      <h1>Task & Habit Tracker</h1>
      <p>Stay organized and build better habits</p>
    </div>
    <div class="Buttons flex justify-center sm:justify-start sm:px-10 items-center">
      <div
        class="flex bg-gray-300 justify-around p-1 sm:*:px-16 *:px-5 gap-1 rounded-full shadow"
      >
        <div id="TaskButtonBg" class="p-1 rounded-full flex items-center">
          <div
            id="TaskButtonPage"
            class="flex justify-center items-center gap-4 cursor-pointer"
          >
            <div><i class="fa-solid fa-tasks"></i></div>
            <div>Tasks</div>
          </div>
        </div>
        <div
          id="HabitButtonBg"
          class="p-1 bg-white rounded-full flex items-center cursor-pointer"
        >
          <button
            id="HabitButtonPage"
            class="flex justify-center items-center gap-4 cursor-pointer"
          >
            <div><i class="fa-solid fa-plus"></i></div>
            <div>Habits</div>
          </button>
        </div>
      </div>
    </div>
    <div id="TaskPage" class="Box px-10 py-10 z-[-1] hidden">
      <div class="cont bg-white rounded-2xl shadow p-4">
        <div class="flex  flex-col sm:flex-row items-center justify-center gap-2">
          <div class="w-full flex items-center justify-center border-2 rounded-2xl p-1 border-gray-500">
            <input
              type="text"
              placeholder="Add a new task"
              class="w-full p-1 outline-none placeholder:capitalize"
              id="TaskInput"
              maxlength="20"
            />
          </div>
          <select
            name="Hardness"
            id="Priority"
            class="flex items-center w-full sm:w-auto outline-none cursor-pointer bg-(--back-color) py-2 rounded-lg capitalize mx-2 px-4 *:bg-amber-300"
          >
            <div class="rounded-full *:rounded-full">
              <option value="Medium" class="rounded-full">Medium</option>
              <option value="Easy" class="">Easy</option>
              <option value="Hard" class="">Hard</option>
            </div>
          </select>
          <div
            class="px-4 flex gap-1.5 w-full sm:w-auto bg-black text-white py-1 rounded-lg capitalize mx-2 cursor-pointer"
            id="AddTaskButton"
          >
            <div><i class="fa-solid fa-plus"></i></div>
            <div class="text-center w-20">add task</div>
          </div>
        </div>
        <div
          id="RepeatedTaskStatement"
          class="text-center py-1 text-red-600 hidden"
        >
          The Task is Available
        </div>
        <div
          id="NoTasks"
          class="flex justify-center items-center w-full flex-col py-10 gap-8"
        >
          <div class="text-gray-400 text-3xl bg-gray-200 p-3 rounded-full">
            <i class="fa-solid fa-plus"></i>
          </div>
          <div class="capitalize text-gray-500">
            no tasks yet. Add your first task above!
          </div>
        </div>
        <div class="p-2">
          <div id="ActiveTasks" class="text-gray-500"></div>
          <div id="TasksList" class="p-2 flex flex-col gap-2"></div>
        </div>
      </div>
    </div>
    <div id="HabitPage" class="Box px-10 py-10">
      <div class="cont bg-white rounded-2xl shadow p-4">
        <div class="flex flex-col sm:flex-row items-center justify-center gap-2">
          <div class="w-full flex items-center justify-center border-2 rounded-2xl p-1 border-gray-500">
            <input
              type="text"
              placeholder="Add a new Habit"
              class="w-full p-1 outline-none placeholder:capitalize"
              id="HabitInput"
              maxlength="20"
            />
          </div>
          <div
            class="px-4 flex w-full sm:w-auto mb-4 gap-1.5 bg-black text-white py-1 cursor-pointer rounded-lg capitalize mx-2"
            id="AddHabitButton"
          >
            <div><i class="fa-solid fa-plus"></i></div>
            <div class="text-center w-20">add Habit</div>
          </div>
        </div>
        <div
          id="RepeatedHabitStatement"
          class="hidden text-center py-1 text-red-600"
        >
          The Habit is Available
        </div>
        <div
          id="NoHabits"
          class="flex justify-center items-center w-full flex-col py-10 gap-8"
        >
          <div class="text-gray-400 text-3xl bg-gray-200 p-3 rounded-full">
            <i class="fa-solid fa-plus"></i>
          </div>
          <div class="capitalize text-gray-500">
            no habits yet. Add your first habit above!
          </div>
        </div>
        <div class="p-2">
          <div id="ActiveHabits" class="text-gray-500"></div>
          <div id="Habits" class="p-2 grid lg:grid-cols-2 xl:grid-cols-3 grid-cols-1 gap-2">
            <!-- Habit One -->
          </div>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
